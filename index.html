<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="/src/style.css" rel="stylesheet" />
    </head>
    <body
        class="font-family-default bg-background text-white px-6 my-18 md:px-18 xl:flex justify-center items-center min-h-screen"
    >
        <main
            class="xl:flex xl:gap-8 xl:justify-center max-w-[69.75em] xl:mx-auto max-h-[32.5em]"
        >
            <div
                class="bg-card-bg rounded-[0.975em] mb-6 xl:mb-0 xl:max-w-[15.93em]"
            >
                <div
                    class="flex gap-6 items-center bg-profile-bg p-8 rounded-[0.975em] xl:flex-col xl:items-start xl:px-8 xl:h-[22.15em]"
                >
                    <img
                        src="/src/assets/img/image-jeremy.png"
                        alt="a profile picture of Jeremy Robson"
                        class="w-16"
                    />
                    <div>
                        <p class="text-smaller-text font-[0.9375em]">
                            Report for
                        </p>
                        <p class="text-2xl font-light xl:text-[2.5em]">
                            Jeremy Robson
                        </p>
                    </div>
                </div>
                <div
                    class="flex justify-around py-6 text-smaller-text xl:flex-col xl:px-8 gap-4"
                >
                    <p data-timeframe="daily" id="daily">Daily</p>
                    <p data-timeframe="weekly" id="weekly">Weekly</p>
                    <p data-timeframe="monthly" id="monthly">Monthly</p>
                </div>
            </div>
            <div
                id="activity-card"
                class="md:grid grid-cols-3 gap-6 xl:gap-8"
            ></div>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
