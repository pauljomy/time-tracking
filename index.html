<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="/src/style.css" rel="stylesheet" />
    </head>
    <body
        class="font-family-default bg-background text-white mx-6 my-18 md:mx-20"
    >
        <main>
            <div class="bg-card-bg rounded-[0.975em] mb-6">
                <div
                    class="flex gap-6 items-center bg-profile-bg p-8 rounded-[0.975em]"
                >
                    <img
                        src="/src/assets/img/image-jeremy.png"
                        alt="a profile picture of Jeremy Robson"
                        class="w-16"
                    />
                    <div>
                        <p class="text-smaller-text font-[0.9375em]">
                            Report for
                        </p>
                        <p class="text-2xl font-light">Jeremy Robson</p>
                    </div>
                </div>
                <div class="flex justify-around py-6 text-smaller-text">
                    <p data-timeframe="daily" id="daily">Daily</p>
                    <p data-timeframe="weekly" id="weekly">Weekly</p>
                    <p data-timeframe="monthly" id="monthly">Monthly</p>
                </div>
            </div>
            <div id="activity-card" class="md:grid grid-cols-3 gap-6"></div>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
